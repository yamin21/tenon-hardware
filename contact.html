  <style>
    .contact-page { padding: 48px 0 80px; }
    .contact-page h1 { font-size: 2rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 8px; color: var(--text); }
    .contact-page > .container > p { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 36px; max-width: 560px; }
    .contact-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 48px;
      align-items: start;
    }
    .contact-field { margin-bottom: 16px; }
    .contact-label {
      display: block;
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }
    .contact-input, .contact-textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.93rem;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.18s;
      box-sizing: border-box;
    }
    .contact-textarea { resize: vertical; min-height: 140px; }
    .contact-input:focus, .contact-textarea:focus { border-color: var(--brand); }
    .contact-submit {
      padding: 13px 32px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;
    }
    .contact-submit:hover { background: var(--brand-hover); }
    .contact-info-card {
      background: var(--bg-soft);
      border-radius: 16px;
      padding: 28px;
    }
    .contact-info-card h2 { font-size: 1.05rem; font-weight: 600; margin: 0 0 18px; color: var(--text); }
    .contact-info-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
    .contact-info-row strong { display: block; color: var(--text); font-weight: 500; margin-bottom: 2px; }
    .contact-info-row a { color: var(--text-muted); text-decoration: none; }
    .contact-info-row a:hover { color: var(--brand); }
    .contact-info-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--brand);
    }
    @media (max-width: 800px) {
      .contact-layout { grid-template-columns: 1fr; gap: 32px; }
      .contact-page h1 { font-size: 1.5rem; }
    }
  </style>

<body>

  <!-- include:header-minimal -->

  <main>
    <section class="contact-page">
      <div class="container">
        <h1>Contact Us</h1>
        <p>Have a question about an order, a product, or a project? Send us a message and our team will get back to you as soon as possible.</p>

        <div class="contact-layout">
          <form id="inquiryForm" onsubmit="submitInquiry(event)">
            <div class="contact-field">
              <label class="contact-label" for="name">Name</label>
              <input class="contact-input" type="text" id="name" placeholder="Your name" required>
            </div>
            <div class="contact-field">
              <label class="contact-label" for="email">Email address</label>
              <input class="contact-input" type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="contact-field">
              <label class="contact-label" for="phone">Phone number (optional)</label>
              <input class="contact-input" type="tel" id="phone" placeholder="+960 ...">
            </div>
            <div class="contact-field">
              <label class="contact-label" for="message">Message</label>
              <textarea class="contact-textarea" id="message" placeholder="Tell us what you need..." required></textarea>
            </div>
            <button type="submit" class="contact-submit">Send Inquiry</button>
          </form>

          <div class="contact-info-card">
            <h2>Get in touch</h2>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
    window.addEventListener('scroll', () => {
      document.getElementById('siteHeader').classList.toggle('site-header--scrolled', window.scrollY > 10);
    });

    function submitInquiry(e) {
      e.preventDefault();
      const name    = document.getElementById('name').value.trim();
      const email   = document.getElementById('email').value.trim();
      const phone   = document.getElementById('phone').value.trim();
      const message = document.getElementById('message').value.trim();

      const subject = encodeURIComponent('Inquiry from ' + name);
      const bodyLines = [message, '', '— ' + name, email];
      if (phone) bodyLines.push(phone);
      const body = encodeURIComponent(bodyLines.join('\n'));

      window.location.href = `mailto:sales@tenon.mv?subject=${subject}&body=${body}`;
    }
  </script>
