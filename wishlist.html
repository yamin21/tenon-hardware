<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>My Wishlist — Tenon Hardware</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
  <style>
    .orders-page {
      min-height: calc(100vh - var(--header-h));
      background: var(--bg-soft);
      padding: 40px 16px;
    }
    .orders-container {
      max-width: 720px;
      margin: 0 auto;
    }
    .orders-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
    }
    .wishlist-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 20px;
      margin-bottom: 14px;
    }
    .wishlist-img {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      border-radius: 10px;
      background: var(--bg-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .wishlist-img img { width: 100%; height: 100%; object-fit: contain; }
    .wishlist-info { flex: 1; min-width: 0; }
    .wishlist-name { font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .wishlist-price { font-size: 0.92rem; color: var(--text); }
    .wishlist-oos { font-size: 0.82rem; color: var(--text-muted); }
    .wishlist-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .wishlist-add-btn {
      padding: 9px 16px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
    }
    .wishlist-add-btn:hover { background: #a82825; }
    .wishlist-add-btn:disabled { opacity: 0.5; cursor: default; }
    .wishlist-remove-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
    }
    .wishlist-remove-btn:hover { background: var(--bg-soft); color: var(--brand); }
    .orders-empty {
      text-align: center;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .orders-empty a { color: var(--brand); font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>

  <header class="site-header" id="siteHeader">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="assets/logo.svg" class="logo" alt="Tenon Hardware" width="120" height="28">
      </a>
      <div></div>
      <div class="header-actions">
        <button class="header-action cart-btn" onclick="window.location.href='index.html'" title="Back to shop">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="orders-page">
    <div class="orders-container">
      <h1 class="orders-title">My Wishlist</h1>
      <div id="wishlistList">Loading…</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/api.js"></script>
  <script>
    function cartStorageKey() {
      const loc = getLocation();
      return loc ? 'tenon_cart_' + loc : 'tenon_cart';
    }
    function loadCart() {
      try {
        const key = cartStorageKey();
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }
    let cartItems = loadCart();
    function saveCart() {
      try { localStorage.setItem(cartStorageKey(), JSON.stringify(cartItems)); } catch {}
    }

    function addWishlistItemToCart(item) {
      const maxQty = item.stock != null ? item.stock : Infinity;
      const existing = cartItems.find(i => i.id === item.id);
      if (existing) existing.qty = Math.min(existing.qty + 1, existing.maxQty ?? maxQty);
      else cartItems.push({ id: item.id, name: item.name, price: item.price ?? 0, image: item.image, qty: Math.min(1, Math.max(maxQty, 1)), maxQty });
      saveCart();
    }

    async function removeItem(id) {
      try {
        await removeFromWishlist(id);
        loadWishlist();
      } catch {
        alert('Could not remove item. Please try again.');
      }
    }

let wishlistById = {};

    function handleAddToCart(btn, id) {
      const item = wishlistById[id];
      if (!item) return;
      addWishlistItemToCart(item);
      btn.textContent = 'Added';
      btn.disabled = true;
    }

    async function loadWishlist() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }

      const listEl = document.getElementById('wishlistList');
      try {
        const items = await getWishlist();
        wishlistById = {};
        items.forEach(item => { wishlistById[item.id] = item; });

        if (!items.length) {
          listEl.innerHTML = `
            <div class="orders-empty">
              Your wishlist is empty.<br>
              <a href="index.html">Start shopping</a>
            </div>`;
          return;
        }

        listEl.innerHTML = items.map((item, i) => `
          <div class="wishlist-card">
            <div class="wishlist-img">${item.image ? `<img src="${item.image}" alt="">` : ''}</div>
            <div class="wishlist-info">
              <div class="wishlist-name">${item.name}</div>
              ${item.stock === 0
                ? `<div class="wishlist-oos">Out of stock</div>`
                : `<div class="wishlist-price">${item.price != null ? 'MVR ' + Number(item.price).toLocaleString() : 'Contact for price'}</div>`}
            </div>
            <div class="wishlist-actions">
              <button class="wishlist-add-btn" ${item.stock === 0 ? 'disabled' : ''} onclick="handleAddToCart(this, '${item.id}')">Add to Cart</button>
              <button class="wishlist-remove-btn" onclick="removeItem('${item.id}')" aria-label="Remove from wishlist">×</button>
            </div>
          </div>
        `).join('');
      } catch (err) {
        listEl.innerHTML = `<div class="orders-empty">Could not load your wishlist. Please try again later.</div>`;
      }
    }

    loadWishlist();

    // Sticky header shadow
    window.addEventListener('scroll', () => {
      document.getElementById('siteHeader').classList.toggle('site-header--scrolled', window.scrollY > 10);
    });
  </script>
</body>
</html>
