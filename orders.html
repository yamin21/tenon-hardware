  <style>
    .orders-page {
      min-height: calc(100vh - var(--header-h));
      background: var(--bg-soft);
      padding: 40px 16px;
    }
    .orders-container {
      max-width: 720px;
      margin: 0 auto;
    }
    .orders-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 24px;
    }
    .order-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 14px;
    }
    .order-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .order-number { font-weight: 700; color: var(--text); }
    .order-date { font-size: 0.83rem; color: var(--text-muted); }
    .order-status {
      display: inline-block;
      padding: 4px 12px;
      border-radius: var(--radius-pill);
      font-size: 0.78rem;
      font-weight: 600;
      background: var(--bg-soft);
      color: var(--text-muted);
      text-transform: capitalize;
    }
    .order-items { font-size: 0.86rem; color: var(--text-muted); margin-bottom: 10px; }
    .order-total {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-top: 1px solid var(--border);
      padding-top: 10px;
      font-size: 0.92rem;
    }
    .order-total strong { font-size: 1.05rem; color: var(--text); }
    .orders-empty {
      text-align: center;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .orders-empty a { color: var(--brand); font-weight: 600; text-decoration: none; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

  <script src="js/api.js"></script>
  <script>
    function statusLabel(s) {
      return (s || '').replace(/_/g, ' ');
    }

    async function loadOrders() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) {
        window.location.href = 'login.html';
        return;
      }

      const listEl = document.getElementById('ordersList');
      try {
        const orders = await getMyOrders();

        if (!orders.length) {
          listEl.innerHTML = `
            <div class="orders-empty">
              You haven't placed any orders yet.<br>
              <a href="index.html">Start shopping</a>
            </div>`;
          return;
        }

        listEl.innerHTML = orders.map(o => `
          <div class="order-card">
            <div class="order-card-top">
              <div>
                <span class="order-number">#${o.order_number}</span>
                <span class="order-date">&nbsp;·&nbsp;${new Date(o.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</span>
              </div>
              <span class="order-status">${statusLabel(o.status)}</span>
            </div>
            <div class="order-items">${o.items.length} item${o.items.length === 1 ? '' : 's'} — ${o.fulfillment === 'pickup' ? 'Pickup' : 'Delivery'}</div>
            <div class="order-total">
              <span>Total</span>
              <strong>MVR ${Number(o.total).toLocaleString()}</strong>
            </div>
          </div>
        `).join('');
      } catch (err) {
        listEl.innerHTML = `<div class="orders-empty">Could not load your orders. Please try again later.</div>`;
      }
    }

    loadOrders();

    document.getElementById('year').textContent = new Date().getFullYear();

    // Sticky header shadow
    window.addEventListener('scroll', () => {
      document.getElementById('siteHeader').classList.toggle('site-header--scrolled', window.scrollY > 10);
    });
  </script>
