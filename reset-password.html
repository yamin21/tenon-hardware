<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password — Tenon Hardware</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/auth.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Jost:wght@400;500;600;700;800&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
</head>
<body>

  <!-- include:header-minimal -->

  <main class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Set a new password</h1>
      <p class="auth-subtitle" id="subtitle">Verifying your reset link…</p>

      <div class="auth-error" id="authError"></div>
      <div class="auth-success" id="authSuccess"></div>

      <form id="resetForm" onsubmit="handleReset(event)" style="display:none">
        <div class="auth-field">
          <label class="auth-label" for="password">New password</label>
          <input class="auth-input" type="password" id="password" placeholder="••••••••" required minlength="8" autocomplete="new-password">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="confirmPassword">Confirm new password</label>
          <input class="auth-input" type="password" id="confirmPassword" placeholder="••••••••" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="auth-submit" id="submitBtn">Update password</button>
      </form>

      <div class="auth-footer">
        <a href="login.html">Back to sign in</a>
      </div>
    </div>
  </main>

  <!-- include:footer -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    const subtitleEl = document.getElementById('subtitle');
    const formEl = document.getElementById('resetForm');
    const errEl = document.getElementById('authError');

    sb.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        subtitleEl.textContent = 'Enter a new password for your account';
        formEl.style.display = 'block';
      }
    });

    // If the recovery link already resolved a session before this listener
    // attached, onAuthStateChange won't fire again — check directly too.
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session && formEl.style.display === 'none') {
        subtitleEl.textContent = 'Enter a new password for your account';
        formEl.style.display = 'block';
      } else if (!session) {
        setTimeout(() => {
          if (formEl.style.display === 'none') {
            subtitleEl.textContent = '';
            errEl.textContent = 'This reset link is invalid or has expired. Request a new one from the sign-in page.';
            errEl.style.display = 'block';
          }
        }, 2500);
      }
    });

    async function handleReset(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');
      const okEl = document.getElementById('authSuccess');

      errEl.style.display = 'none';
      okEl.style.display = 'none';

      if (password !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Updating…';
      btn.disabled = true;

      const { error } = await sb.auth.updateUser({ password });

      if (error) {
        errEl.textContent = error.message || 'Could not update password.';
        errEl.style.display = 'block';
        btn.textContent = 'Update password';
        btn.disabled = false;
        return;
      }

      formEl.style.display = 'none';
      okEl.textContent = 'Password updated. Redirecting to sign in…';
      okEl.style.display = 'block';
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    }

    document.getElementById('year').textContent = new Date().getFullYear();

    // Sticky header shadow
    window.addEventListener('scroll', () => {
      document.getElementById('siteHeader').classList.toggle('site-header--scrolled', window.scrollY > 10);
    });
  </script>
</body>
</html>
