    .auth-footer {

        <div class="auth-field">

  <script>
    const subtitleEl = document.getElementById('subtitle');
    const formEl = document.getElementById('resetForm');
    const errEl = document.getElementById('authError');

    sb.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        subtitleEl.textContent = 'Enter a new password for your account';
        formEl.style.display = 'block';
      }
    });

    // If the recovery link already resolved a session before this listener
    // attached, onAuthStateChange won't fire again — check directly too.
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session && formEl.style.display === 'none') {
        subtitleEl.textContent = 'Enter a new password for your account';
        formEl.style.display = 'block';
      } else if (!session) {
        setTimeout(() => {
          if (formEl.style.display === 'none') {
            subtitleEl.textContent = '';
            errEl.textContent = 'This reset link is invalid or has expired. Request a new one from the sign-in page.';
            errEl.style.display = 'block';
          }
        }, 2500);
      }
    });

    async function handleReset(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');
      const okEl = document.getElementById('authSuccess');

      errEl.style.display = 'none';
      okEl.style.display = 'none';

      if (password !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Updating…';
      btn.disabled = true;

      const { error } = await sb.auth.updateUser({ password });

      if (error) {
        errEl.textContent = error.message || 'Could not update password.';
        errEl.style.display = 'block';
        btn.textContent = 'Update password';
        btn.disabled = false;
        return;
      }

      formEl.style.display = 'none';
      okEl.textContent = 'Password updated. Redirecting to sign in…';
      okEl.style.display = 'block';
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    }

    document.getElementById('year').textContent = new Date().getFullYear();

    // Sticky header shadow
    window.addEventListener('scroll', () => {
      document.getElementById('siteHeader').classList.toggle('site-header--scrolled', window.scrollY > 10);
    });
  </script>
