<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password — Tenon Hardware</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Jost:wght@400;500;600;700;800&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
  <style>
    .auth-page {
      min-height: calc(100vh - var(--header-h));
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-soft);
      padding: 40px 16px;
    }
    .auth-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 44px;
      width: 100%;
      max-width: 420px;
    }
    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .auth-subtitle {
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-field { margin-bottom: 16px; }
    .auth-label {
      display: block;
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }
    .auth-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.93rem;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.18s;
      box-sizing: border-box;
    }
    .auth-input:focus { border-color: var(--brand); }
    .auth-submit {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;
    }
    .auth-submit:hover { background: #a82825; }
    .auth-submit:disabled { opacity: 0.7; cursor: default; }
    .auth-footer {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 20px;
    }
    .auth-footer a { color: var(--brand); text-decoration: none; font-weight: 500; }
    .auth-success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #15803d;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>

  <header class="site-header" id="siteHeader">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="assets/logo.svg" class="logo" alt="Tenon Hardware" width="120" height="28">
      </a>
      <div></div>
      <div class="header-actions">
        <button class="header-action cart-btn" onclick="window.location.href='index.html'" title="Back to shop">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Set a new password</h1>
      <p class="auth-subtitle" id="subtitle">Verifying your reset link…</p>

      <div class="auth-error" id="authError"></div>
      <div class="auth-success" id="authSuccess"></div>

      <form id="resetForm" onsubmit="handleReset(event)" style="display:none">
        <div class="auth-field">
          <label class="auth-label" for="password">New password</label>
          <input class="auth-input" type="password" id="password" placeholder="••••••••" required minlength="8" autocomplete="new-password">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="confirmPassword">Confirm new password</label>
          <input class="auth-input" type="password" id="confirmPassword" placeholder="••••••••" required minlength="8" autocomplete="new-password">
        </div>
        <button type="submit" class="auth-submit" id="submitBtn">Update password</button>
      </form>

      <div class="auth-footer">
        <a href="login.html">Back to sign in</a>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    const subtitleEl = document.getElementById('subtitle');
    const formEl = document.getElementById('resetForm');
    const errEl = document.getElementById('authError');

    sb.auth.onAuthStateChange((event) => {
      if (event === 'PASSWORD_RECOVERY') {
        subtitleEl.textContent = 'Enter a new password for your account';
        formEl.style.display = 'block';
      }
    });

    // If the recovery link already resolved a session before this listener
    // attached, onAuthStateChange won't fire again — check directly too.
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session && formEl.style.display === 'none') {
        subtitleEl.textContent = 'Enter a new password for your account';
        formEl.style.display = 'block';
      } else if (!session) {
        setTimeout(() => {
          if (formEl.style.display === 'none') {
            subtitleEl.textContent = '';
            errEl.textContent = 'This reset link is invalid or has expired. Request a new one from the sign-in page.';
            errEl.style.display = 'block';
          }
        }, 2500);
      }
    });

    async function handleReset(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');
      const okEl = document.getElementById('authSuccess');

      errEl.style.display = 'none';
      okEl.style.display = 'none';

      if (password !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Updating…';
      btn.disabled = true;

      const { error } = await sb.auth.updateUser({ password });

      if (error) {
        errEl.textContent = error.message || 'Could not update password.';
        errEl.style.display = 'block';
        btn.textContent = 'Update password';
        btn.disabled = false;
        return;
      }

      formEl.style.display = 'none';
      okEl.textContent = 'Password updated. Redirecting to sign in…';
      okEl.style.display = 'block';
      setTimeout(() => { window.location.href = 'login.html'; }, 1500);
    }

    // Sticky header shadow
    window.addEventListener('scroll', () => {
      document.getElementById('siteHeader').classList.toggle('site-header--scrolled', window.scrollY > 10);
    });
  </script>
</body>
</html>
