  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Jost:wght@400;500;600;700;800&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
  <style>
    .auth-card { max-width: 440px; }
    .auth-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .auth-submit { margin-top: 8px; }
    .auth-terms {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .auth-terms input { margin-top: 3px; }
    @media (max-width: 480px) {
      .auth-row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

  <!-- include:header-minimal -->

  <main class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Sign up to track orders and check out faster</p>

      <div class="auth-error" id="authError"></div>
      <div class="auth-success" id="authSuccess"></div>

      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="auth-row">
          <div class="auth-field">
            <label class="auth-label" for="firstName">First name</label>
            <input class="auth-input" type="text" id="firstName" placeholder="Ahmed" required autocomplete="given-name">
          </div>
          <div class="auth-field">
            <label class="auth-label" for="lastName">Last name</label>
            <input class="auth-input" type="text" id="lastName" placeholder="Hassan" required autocomplete="family-name">
          </div>
        </div>
        <div class="auth-field">
          <label class="auth-label" for="email">Email address</label>
          <input class="auth-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="phone">Phone number</label>
          <input class="auth-input" type="tel" id="phone" placeholder="+960 7XXXXXX" required autocomplete="tel">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="password">Password</label>
          <input class="auth-input" type="password" id="password" placeholder="••••••••" required minlength="8" autocomplete="new-password">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="confirmPassword">Confirm password</label>
          <input class="auth-input" type="password" id="confirmPassword" placeholder="••••••••" required minlength="8" autocomplete="new-password">
        </div>
        <label class="auth-terms">
          <input type="checkbox" required>
          I agree to the Terms of Service and Privacy Policy
        </label>
        <button type="submit" class="auth-submit" id="submitBtn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

  <!-- include:footer -->

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/supabase-client.js"></script>
  <script>
    async function handleSignup(e) {
      e.preventDefault();
      const firstName = document.getElementById('firstName').value.trim();
      const lastName  = document.getElementById('lastName').value.trim();
      const email     = document.getElementById('email').value.trim();
      const phone     = document.getElementById('phone').value.trim();
      const password  = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn    = document.getElementById('submitBtn');
      const errEl  = document.getElementById('authError');
      const okEl   = document.getElementById('authSuccess');

      errEl.style.display = 'none';
      okEl.style.display = 'none';

      if (password !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Creating account…';
      btn.disabled = true;

      const { data, error } = await sb.auth.signUp({
        email,
        password,
        options: { data: { first_name: firstName, last_name: lastName, phone } }
      });

      if (error) {
        errEl.textContent = error.message || 'Could not create account.';
        errEl.style.display = 'block';
        btn.textContent = 'Create Account';
        btn.disabled = false;
        return;
      }

      if (data.session) {
        window.location.href = 'index.html';
      } else {
        okEl.textContent = 'Account created! Check your email to confirm your account, then sign in.';
        okEl.style.display = 'block';
        document.getElementById('signupForm').reset();
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }

    document.getElementById('year').textContent = new Date().getFullYear();

    // Sticky header shadow
    window.addEventListener('scroll', () => {
      document.getElementById('siteHeader').classList.toggle('site-header--scrolled', window.scrollY > 10);
    });
  </script>
</body>
</html>
