<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign Up — Tenon Hardware</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
  <style>
    .auth-page {
      min-height: calc(100vh - var(--header-h));
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-soft);
      padding: 40px 16px;
    }
    .auth-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 44px;
      width: 100%;
      max-width: 440px;
    }
    .auth-logo {
      display: block;
      margin: 0 auto 28px;
      height: 28px;
    }
    .auth-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .auth-subtitle {
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 32px;
    }
    .auth-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .auth-field { margin-bottom: 16px; }
    .auth-label {
      display: block;
      font-size: 0.83rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }
    .auth-input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.93rem;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.18s;
      box-sizing: border-box;
    }
    .auth-input:focus { border-color: var(--brand); }
    .auth-submit {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.18s;
    }
    .auth-submit:hover { background: #a82825; }
    .auth-submit:disabled { opacity: 0.7; cursor: default; }
    .auth-footer {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 20px;
    }
    .auth-footer a { color: var(--brand); text-decoration: none; font-weight: 500; }
    .auth-terms {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 20px;
    }
    .auth-terms input { margin-top: 3px; }
    .auth-error, .auth-success {
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .auth-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
    }
    .auth-success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #15803d;
    }
    @media (max-width: 480px) {
      .auth-card { padding: 32px 24px; }
      .auth-row { grid-template-columns: 1fr; gap: 0; }
    }
  </style>
</head>
<body>

  <header class="site-header" id="siteHeader">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="assets/logo.svg" class="logo" alt="Tenon Hardware" width="120" height="28">
      </a>
      <div></div>
      <div class="header-actions">
        <button class="header-action cart-btn" onclick="window.location.href='index.html'" title="Back to shop">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card">
      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Sign up to track orders and check out faster</p>

      <div class="auth-error" id="authError"></div>
      <div class="auth-success" id="authSuccess"></div>

      <form id="signupForm" onsubmit="handleSignup(event)">
        <div class="auth-row">
          <div class="auth-field">
            <label class="auth-label" for="firstName">First name</label>
            <input class="auth-input" type="text" id="firstName" placeholder="Ahmed" required autocomplete="given-name">
          </div>
          <div class="auth-field">
            <label class="auth-label" for="lastName">Last name</label>
            <input class="auth-input" type="text" id="lastName" placeholder="Hassan" required autocomplete="family-name">
          </div>
        </div>
        <div class="auth-field">
          <label class="auth-label" for="email">Email address</label>
          <input class="auth-input" type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="phone">Phone number</label>
          <input class="auth-input" type="tel" id="phone" placeholder="+960 7XXXXXX" required autocomplete="tel">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="password">Password</label>
          <input class="auth-input" type="password" id="password" placeholder="••••••••" required minlength="8" autocomplete="new-password">
        </div>
        <div class="auth-field">
          <label class="auth-label" for="confirmPassword">Confirm password</label>
          <input class="auth-input" type="password" id="confirmPassword" placeholder="••••••••" required minlength="8" autocomplete="new-password">
        </div>
        <label class="auth-terms">
          <input type="checkbox" required>
          I agree to the Terms of Service and Privacy Policy
        </label>
        <button type="submit" class="auth-submit" id="submitBtn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </main>

  <script src="js/api.js"></script>
  <script>
    async function handleSignup(e) {
      e.preventDefault();
      const firstName = document.getElementById('firstName').value.trim();
      const lastName  = document.getElementById('lastName').value.trim();
      const email     = document.getElementById('email').value.trim();
      const phone     = document.getElementById('phone').value.trim();
      const password  = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const btn    = document.getElementById('submitBtn');
      const errEl  = document.getElementById('authError');
      const okEl   = document.getElementById('authSuccess');

      errEl.style.display = 'none';
      okEl.style.display = 'none';

      if (password !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Creating account…';
      btn.disabled = true;

      try {
        const res = await fetch(API_BASE + '/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': API_KEY },
          body: JSON.stringify({ first_name: firstName, last_name: lastName, email, phone, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Could not create account.');

        if (data.token || data.data?.token) {
          localStorage.setItem('tenon_token', data.token || data.data.token);
          window.location.href = 'index.html';
        } else {
          okEl.textContent = 'Account created! You can now sign in.';
          okEl.style.display = 'block';
          document.getElementById('signupForm').reset();
          btn.textContent = 'Create Account';
          btn.disabled = false;
        }
      } catch (err) {
        errEl.textContent = err.message || 'Something went wrong. Please try again.';
        errEl.style.display = 'block';
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    }

    // Sticky header shadow
    window.addEventListener('scroll', () => {
      document.getElementById('siteHeader').classList.toggle('site-header--scrolled', window.scrollY > 10);
    });
  </script>
</body>
</html>
