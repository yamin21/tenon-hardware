  <header class="site-header" id="siteHeader">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="assets/logo.svg" class="logo" alt="Tenon Hardware" width="120" height="28">
      </a>
      <div class="search-wrap">
        <form class="search-form" onsubmit="event.preventDefault(); doSearch()">
          <div class="search-box">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" class="search-input" placeholder="Search tools, materials, brands…" id="searchInput" autocomplete="off" onfocus="showSearchSuggestions()" oninput="handleSearchInput(this.value)">
            <button type="submit" class="search-btn">Search</button>
          </div>
          <div class="search-suggestions" id="searchSuggestions">
            <div class="suggestion-results" id="suggestionResults"></div>
          </div>
        </form>
      </div>
      <div class="header-actions">
        <button class="location-pill" id="locationPill" onclick="openLocationModal(false)" title="Change location">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>Set location</span>
        </button>
        <div class="header-action-wrap">
          <a href="login.html" class="header-action" title="My Account" id="accountLink" onclick="handleAccountClick(event)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.582-7 8-7s8 3 8 7"/></svg>
          </a>
          <div class="account-dropdown" id="accountDropdown">
            <a href="orders.html">My Orders</a>
            <a href="wishlist.html">Wishlist</a>
            <button onclick="handleSignOut(event)">Sign out</button>
          </div>
        </div>
        <button class="header-action cart-btn" onclick="toggleCart()" title="Cart">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-count cart-count--hidden" id="cartCount">0</span>
        </button>
        <button class="hamburger" id="hamburger" onclick="toggleMobileMenu()" aria-label="Menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Category Nav ──────────────────────────────────────── -->
  <nav class="cat-nav" id="catNav">
    <div class="container cat-nav-wrap">
      <button class="cat-nav-arrow cat-nav-arrow--left" id="catNavLeft" onclick="scrollCatNav(-1)" aria-label="Scroll left">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="cat-nav-inner" id="catNavInner">
      </div>
      <button class="cat-nav-arrow cat-nav-arrow--right" id="catNavRight" onclick="scrollCatNav(1)" aria-label="Scroll right">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </nav>

  <!-- ── Sub-Category Nav (mobile only) ───────────────────── -->
  <div class="sub-nav" id="subNav">
    <div class="sub-nav-inner" id="subNavInner"></div>
  </div>

  <!-- ── Category Dropdown (desktop only) ──────────────────── -->
  <div class="cat-dropdown" id="catDropdown">
    <div class="cat-dropdown-inner" id="catDropdownInner"></div>
  </div>
